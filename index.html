<head>
  <title>Password Judge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main>
  
  <h1>Password Judge</h1>
  
  <section class="card">
    
    <h3>How to create a strong password:</h3>
    <ul>
      
      <li>Use at least 8 characters - the more the better!</li>
       <li>Mix uppercase and lowercase letters</li>
       <li>Include at least one number (0-9)</li>
       <li>Add a symbol or special character (!@#$%^&*())</li>
    </ul>
      
  
  <label for="passlnput">Enter Password:</label>
  
  <div class="inputContainer">
  
  <input type="password" id="passInput" placeholder="Type here...">
    <br>
    <input type="checkbox" id="showPass"> Show Password
    
  </div>
  
  <p>Strength:
  <div id="strengthText">Waiting...</div>
  
  </p>
  
  </section>
  
  </main>

  <script src="script.js"></script>

</body>
